<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; background: transparent; }
  svg { display: block; }
</style>
</head>
<body>
  <!-- EcoDB app icon: rounded dark tile + Eco Consulting mark (no text), mark scaled up. -->
  <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EcoDB">
    <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#0d0b0a"/>
    <!-- mark from avatar.html (32 viewBox) scaled 26x, centered: translate (1024-32*26)/2 = 96 -->
    <g transform="translate(96,96) scale(26)">
      <rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="#efe9e1" stroke-width="1.8"/>
      <line x1="8" y1="10" x2="24" y2="10" stroke="#efe9e1" stroke-width="2.2" stroke-linecap="square"/>
      <line x1="8" y1="16" x2="20" y2="16" stroke="#f5631e" stroke-width="2.2" stroke-linecap="square"/>
      <line x1="8" y1="22" x2="24" y2="22" stroke="#efe9e1" stroke-width="2.2" stroke-linecap="square"/>
    </g>
  </svg>
</body>
</html>
